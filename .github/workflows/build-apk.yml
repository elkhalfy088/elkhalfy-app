name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Set up local.properties
        run: |
          FLUTTER_PATH=$(which flutter)
          FLUTTER_SDK=$(dirname $(dirname $FLUTTER_PATH))
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties
          echo "=== local.properties ==="
          cat android/local.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Fix gradle permissions
        run: |
          chmod +x android/gradlew || true

      - name: Build APK (debug)
        run: flutter build apk --debug --no-tree-shake-icons --verbose 2>&1 | tail -50

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: elkhalfy-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Build APK (release)
        run: flutter build apk --release --no-tree-shake-icons
        continue-on-error: true

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: elkhalfy-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
        continue-on-error: true
